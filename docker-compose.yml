services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: f1-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: f1_predictions
      POSTGRES_USER: f1user
      POSTGRES_PASSWORD: f1password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - f1-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U f1user -d f1_predictions"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # Combined Backend + Frontend
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: f1-app
    restart: unless-stopped
    ports:
      - "5000:5000"
    env_file:
      - ./backend/.env
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://f1user:f1password@postgres:5432/f1_predictions
    volumes:
      - ./backend/uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - f1-network

volumes:
  postgres_data:

networks:
  f1-network:
    driver: bridge
